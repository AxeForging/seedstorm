dir_structure:
  allowedPaths:
    - "."
    - "cmd/**"
    - "internal/**"
    - "integration/**"
    - "init/**"
    - ".github/**"
    - "bin/**"
    - "dist/**"
  requiredPaths:
    - "cmd/seedstorm/main.go"
    - "internal/app/app.go"
    - "internal/build/info.go"
    - "internal/cli/root.go"
    - "internal/db/db.go"
    - "internal/faker/faker.go"
    - "internal/schema/schema.go"
    - "internal/graph/graph.go"
    - "internal/ai/ai.go"
    - "internal/logging/logging.go"
    - "Makefile"
    - "go.mod"

file_naming_pattern:
  allowed:
    - "*.go"
    - "*.mod"
    - "*.sum"
    - "*.yaml"
    - "*.yml"
    - "*.md"
    - "*.txt"
    - "*.sql"
    - "README*"
    - "LICENSE*"
    - "Makefile"
    - ".gitignore"
    - ".golangci.yml"
    - ".goreleaser.yml"
    - ".structlint.yaml"
    - "lefthook.yml"
  disallowed:
    - "*.env*"
    - ".env*"
    - "*.key"
    - "*.pem"
    - "*.log"
    - "*.tmp"
    - ".DS_Store"
    - "Thumbs.db"
  required:
    - "go.mod"
    - "README.md"
    - ".gitignore"
    - "*.go"

ignore:
  - ".git"
  - "vendor"
  - "node_modules"
  - "bin"
  - "dist"
