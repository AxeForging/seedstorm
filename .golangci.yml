run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - misspell
    - errcheck
    - gofumpt
  disable:
    - depguard

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.Rows).Close
      - (*database/sql.DB).Close
      - (*database/sql.Stmt).Close

issues:
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
