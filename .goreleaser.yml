version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/seedstorm
    binary: seedstorm
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/AxeForging/seedstorm/internal/build.Version={{.Version}}
      - -X github.com/AxeForging/seedstorm/internal/build.Commit={{.FullCommit}}
      - -X github.com/AxeForging/seedstorm/internal/build.Date={{.Date}}
      - -X github.com/AxeForging/seedstorm/internal/build.BuiltBy=goreleaser
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    name_template: "seedstorm-{{ .Os }}-{{ .Arch }}"
    files:
      - README.md
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: AxeForging
    name: seedstorm
  draft: false
  prerelease: auto
  name_template: "Release {{ .Tag }}"
  footer: |
    ## Installation

    ### Go Install
    ```bash
    go install github.com/AxeForging/seedstorm/cmd/seedstorm@{{ .Tag }}
    ```

    ### Linux/macOS (AMD64)
    ```bash
    curl -L https://github.com/AxeForging/seedstorm/releases/download/{{ .Tag }}/seedstorm-linux-amd64.tar.gz | tar xz
    chmod +x seedstorm-linux-amd64
    sudo mv seedstorm-linux-amd64 /usr/local/bin/seedstorm
    ```

    ### Linux/macOS (ARM64)
    ```bash
    curl -L https://github.com/AxeForging/seedstorm/releases/download/{{ .Tag }}/seedstorm-linux-arm64.tar.gz | tar xz
    chmod +x seedstorm-linux-arm64
    sudo mv seedstorm-linux-arm64 /usr/local/bin/seedstorm
    ```
